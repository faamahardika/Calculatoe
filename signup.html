<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
    <title>Sign Up - Calculatoe.</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="sign-up-container">
        <h1>Create an Account</h1>
        <form id="sign-up-form" autocomplete="off">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="new-password" placeholder="Password" required>
            <input type="password" id="confirm-password" placeholder="Confirm Password" required>
            <button type="submit">Sign Up</button>
        </form>
        <p class="sign-in-text">
            Already have an account? <a href="signin.html" class="sign-in-link">Sign In</a>
        </p>
        <a href="index.html" class="back-to-home">Back to Home</a>
    </div>

    <script type="module" src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js"></script>
    <script type="module" src="config/firebase.js"></script>
    <script type="module" src="js/signup.js"></script>

</body>
<footer class="footer">

</footer>
</html>
