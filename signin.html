<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Calculatoe.</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="sign-in-container">
        <h1>Sign In</h1>
        <form id="sign-in-form" autocomplete="off">
            <input type="text" id="username-email" placeholder="Username or Email" required>
            <input type="password" id="password" placeholder="Password" required>
           <button type="submit">Sign In</button>
        </form>
        <p class="sign-up-text">
            Don't have an account? <a href="signup.html" class="sign-up-link">Sign Up</a>
        </p>
        <a href="index.html" class="back-to-home">Back to Home</a>
    </div>

    <script src="signin.js"></script>
</body>

</html>
